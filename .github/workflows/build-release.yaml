name: Build and Push (release)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  id-token: write
  contents: read

env:
  CHART_PATH: go-app/deploy/helm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        working-directory: go-app
        run: go test ./...

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version (strip v prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: demo-app
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          docker build -t "${REGISTRY}/${REPOSITORY}:v${VERSION}" go-app/
          docker push "${REGISTRY}/${REPOSITORY}:v${VERSION}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Stamp Chart.yaml version for packaging
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ${{ env.CHART_PATH }}/Chart.yaml

      - name: Authenticate Helm to ECR OCI
        run: |
          echo "${{ steps.login-ecr.outputs.password }}" | helm registry login \
            ${{ steps.login-ecr.outputs.registry }} \
            --username AWS \
            --password-stdin

      - name: Package and push Helm chart to ECR OCI
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          helm package ${{ env.CHART_PATH }} --destination .deploy-output
          helm push ".deploy-output/demo-app-${VERSION}.tgz" \
            "oci://${REGISTRY}/demo-app-chart"
          {
            echo "### Release published"
            echo "- Image: \`demo-app:v${VERSION}\`"
            echo "- Chart: \`demo-app-chart:${VERSION}\`"
            echo ""
            echo "To promote to staging: update \`image.tag\` and \`helmCharts[0].version\` in a PR."
          } >> "$GITHUB_STEP_SUMMARY"
