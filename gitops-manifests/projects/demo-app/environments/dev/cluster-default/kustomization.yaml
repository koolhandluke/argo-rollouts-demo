apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rollouts-dev   # Kustomize injects this into every rendered resource

resources:
  # 5 levels up → gitops-manifests/, then shared/argo/analysis-templates/
  - ../../../../../shared/argo/analysis-templates/prometheus-success-rate.yaml

helmCharts:
  - name: demo-app
    # 6 levels up → repo root, then go-app/deploy/helm
    path: ../../../../../../go-app/deploy/helm
    releaseName: demo-app
    valuesFiles:
      - ../shared-dev-values.yaml      # env-wide: image.tag, strategy, replicas
      - ./values-override.yaml         # cluster-specific: region, ingress host
