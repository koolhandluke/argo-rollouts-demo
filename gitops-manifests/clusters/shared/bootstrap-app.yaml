apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-shared-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/koolhandluke/argo-rollouts-demo
    targetRevision: main
    path: gitops-manifests/clusters/shared
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
