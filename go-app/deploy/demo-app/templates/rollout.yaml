apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "demo-app.fullname" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "demo-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: demo-app
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "demo-app.fullname" . }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
  {{- if eq .Values.rollout.strategy "instant" }}
  strategy:
    canary:
      steps:
        - setWeight: 100
  {{- else if eq .Values.rollout.strategy "blueGreen" }}
  strategy:
    blueGreen:
      activeService: {{ include "demo-app.fullname" . }}-stable
      previewService: {{ include "demo-app.fullname" . }}-canary
      autoPromotionEnabled: false
  {{- else if eq .Values.rollout.strategy "canary" }}
  strategy:
    canary:
      stableService: {{ include "demo-app.fullname" . }}-stable
      canaryService: {{ include "demo-app.fullname" . }}-canary
      # trafficRouting omitted intentionally — Rollouts uses replica-weighted
      # traffic approximation (basic K8s Services). Add a trafficRouting
      # provider (Istio, NGINX, Gateway API) for request-level traffic splitting.
      steps:
        - setWeight: 20
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 100
      analysis:
        templates:
          - templateName: prometheus-success-rate
            clusterScope: true
        startingStep: 1
        args:
          - name: service-name
            value: {{ include "demo-app.fullname" . }}-canary
  {{- end }}
